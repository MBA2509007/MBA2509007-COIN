<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBA ONLINE EXCHANGE | PENANG TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f0b90b;
            --dark: #050505;
            --green: #00ff7f;
            --red: #ff4d4d;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark);
            color: white;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 背景装饰 (模拟光纤/网格感) */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(240, 185, 11, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(240, 185, 11, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotate(15deg);
            z-index: 0;
        }

        /* 右上角：汇率卡片与节点状态 */
        .status-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--green);
            padding: 12px 18px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 255, 127, 0.15);
        }

        .node-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--red);
            border-radius: 50%;
            animation: pulse-red 1.5s infinite;
            box-shadow: 0 0 8px var(--red);
        }

        @keyframes pulse-red {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .status-container h2 {
            margin: 0;
            font-size: 0.65rem;
            letter-spacing: 1px;
        }

        .price-text {
            margin: 5px 0 0 0;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            white-space: nowrap;
        }

        /* 中央：登录终端面板 */
        .login-card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 360px;
            background: var(--glass);
            border: 1px solid rgba(240, 185, 11, 0.3);
            border-top: 4px solid var(--gold);
            padding: 40px 30px;
            border-radius: 0 0 10px 10px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            text-align: center;
        }

        .login-card h1 {
            color: var(--gold);
            font-size: 1.4rem;
            margin-bottom: 30px;
            letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(240, 185, 11, 0.3);
        }

        .input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(240, 185, 11, 0.4);
            padding: 15px;
            margin-bottom: 15px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
        }

        .input-field:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(240, 185, 11, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: black;
            border: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
        }

        .login-btn:hover {
            background: #ffcf33;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(240, 185, 11, 0.4);
        }

        .reg-footer {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #888;
        }

        .reg-link {
            color: var(--gold);
            cursor: pointer;
            text-decoration: underline;
            margin-left: 5px;
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .status-container {
                top: 10px;
                right: 10px;
                padding: 10px;
            }
            .price-text { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="status-container">
        <div class="node-tag">
            <div class="pulse-dot"></div>
            <h2 style="color: var(--red);">PENANG_NODE_ACTIVE</h2>
        </div>
        <h2 style="color: var(--green);">LIVE VALUATION</h2>
        <p class="price-text">1 COIN = 100 USD</p>
    </div>

    <div class="login-card">
        <h1>MBA_TERMINAL</h1>
        
        <input type="text" class="input-field" placeholder="CLIENT ID" id="username">
        <input type="password" class="input-field" placeholder="SECURE PIN" maxlength="6" id="pin">
        
        <button class="login-btn" onclick="handleLogin()">LOGIN</button>
        
        <div class="reg-footer">
            SYSTEM ACCESS REQUIRED? <span class="reg-link" onclick="handleRegister()">REGISTER</span>
        </div>
    </div>

    <script>
        function handleLogin() {
            console.log("Attempting terminal access...");
            // 这里对接你的 server.js 登录接口
        }

        function handleRegister() {
            alert("PROTOCOL: REDIRECTING TO REGISTRATION NODE...");
            // 这里对接注册逻辑
        }
    </script>

</body>
</html>
