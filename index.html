<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Financial Terminal | 1,000,000 COIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f0b90b; --bg: #050505; --neon-green: #00ff88; --error: #ff4d4d; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        
        /* 顶部状态栏 */
        .top-bar { 
            position: fixed; top: 0; width: 100%; padding: 20px 40px; 
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 100; box-sizing: border-box;
        }
        .reserve-box { color: var(--gold); font-size: 20px; font-weight: 900; letter-spacing: 2px; }
        .time-box { text-align: center; color: rgba(255,255,255,0.6); font-size: 14px; }
        #live-clock { display: block; color: #fff; font-size: 18px; font-weight: 900; }
        .rate-card { 
            background: rgba(0, 255, 136, 0.1); border: 1px solid var(--neon-green);
            padding: 10px 25px; border-radius: 12px; color: var(--neon-green);
            font-size: 22px; font-weight: 900; animation: pulse 2s infinite;
        }

        /* 布局 */
        .container { display: flex; height: 100vh; width: 100vw; }
        .left-zone { flex: 1.2; position: relative; }
        #canvas { width: 100%; height: 100%; }
        .right-zone { 
            flex: 0.8; display: flex; align-items: center; justify-content: center; 
            background: rgba(10,10,10,0.5); backdrop-filter: blur(15px); 
            border-left: 1px solid rgba(255,255,255,0.05); 
        }
        .panel { width: 85%; max-width: 400px; }
        .card { 
            background: rgba(255,255,255,0.03); padding: 30px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
        }

        /* 表单元素 */
        h2 { color: var(--gold); margin: 0 0 20px 0; font-size: 1.5rem; letter-spacing: 3px; }
        input { 
            width: 100%; padding: 16px; margin: 10px 0; background: #000; 
            border: 1px solid #333; color: var(--gold); border-radius: 8px; 
            font-family: 'Orbitron'; font-size: 14px; box-sizing: border-box; 
        }
        button { 
            width: 100%; padding: 18px; margin-top: 15px; background: var(--gold); 
            color: #000; border: none; border-radius: 8px; font-family: 'Orbitron'; 
            font-weight: 900; cursor: pointer; transition: 0.3s; 
        }
        button:hover { background: #fff; transform: translateY(-2px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .hidden { display: none !important; }
        @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
        
        @media (max-width: 768px) {
            .container { flex-direction: column; overflow-y: auto; }
            .left-zone { height: 40vh; }
            .right-zone { flex: none; padding: 40px 0; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="reserve-box">RESERVE: 1,000,000 COIN</div>
        <div class="time-box">
            <span id="live-date">---</span>
            <span id="live-clock">00:00:00</span>
        </div>
        <div class="rate-card">1 COIN ≈ 100 USD</div>
    </div>

    <div class="container">
        <div class="left-zone">
            <canvas id="canvas"></canvas>
        </div>
        
        <div class="right-zone">
            <div class="panel">
                <div id="auth-view" class="card">
                    <h2>Terminal Access</h2>
                    <input id="login-name" placeholder="IDENTIFICATION ID">
                    <input id="login-pin" type="password" placeholder="SECURITY PIN">
                    <button onclick="handleLogin()">INITIALIZE LOGIN</button>
                    
                    <div style="margin:25px 0; height:1px; background:rgba(255,255,255,0.1); position:relative;">
                        <span style="position:absolute; top:-10px; left:45%; background:#111; padding:0 10px; font-size:10px; color:rgba(255,255,255,0.3);">OR</span>
                    </div>
                    
                    <input id="reg-name" placeholder="NEW UNIQUE ID">
                    <input id="reg-pin" type="password" placeholder="6-DIGIT PIN">
                    <button style="background:transparent; border:1px solid var(--gold); color:var(--gold);" onclick="handleRegister()">CREATE IDENTITY</button>
                </div>

                <div id="wallet-view" class="card hidden">
                    <div style="font-size:10px; color:rgba(255,255,255,0.4); letter-spacing:2px;">AUTHENTICATED_AGENT</div>
                    <h2 id="display-name" style="margin-bottom:5px;">---</h2>
                    
                    <div style="font-size:32px; color:#fff; font-weight:900; margin:25px 0; padding:15px; background:rgba(255,255,255,0.02); border-radius:10px;">
                        <span style="font-size:12px; color:var(--gold); display:block; margin-bottom:5px;">CURRENT BALANCE:</span>
                        <span id="display-balance">0.00</span> <span style="font-size:14px; color:var(--gold);">COIN</span>
                    </div>

                    <div style="border-top:1px solid rgba(255,255,255,0.1); padding-top:20px;">
                        <h2 style="font-size:14px;">Secure Transfer</h2>
                        <input id="tx-to" placeholder="RECIPIENT ID">
                        <input id="tx-amount" type="number" placeholder="AMOUNT">
                        <input id="tx-pin" type="password" placeholder="CONFIRM PIN">
                        <button id="tx-btn" onclick="handleTransfer()">AUTHORIZE TRANSFER</button>
                        <button onclick="handleLogout()" style="background:none; color:rgba(255,255,255,0.3); font-size:11px; margin-top:15px;">TERMINATE SESSION</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 核心业务逻辑 ---
        const API_BASE = '/api'; // 如果是前后端分离，请填写完整URL

        async function updateUI() {
            const token = localStorage.getItem('jwt_token');
            if (!token) {
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('wallet-view').classList.add('hidden');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                if (data.ok) {
                    document.getElementById('display-name').innerText = data.user.name;
                    document.getElementById('display-balance').innerText = Number(data.user.balance).toLocaleString();
                    document.getElementById('auth-view').classList.add('hidden');
                    document.getElementById('wallet-view').classList.remove('hidden');
                } else {
                    handleLogout();
                }
            } catch (e) { console.error("Session Error"); }
        }

        async function handleLogin() {
            const name = document.getElementById('login-name').value;
            const pin = document.getElementById('login-pin').value;
            const res = await fetch(`${API_BASE}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, pin })
            });
            const data = await res.json();
            if (data.token) {
                localStorage.setItem('jwt_token', data.token);
                updateUI();
            } else alert(data.error);
        }

        async function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const pin = document.getElementById('reg-pin').value;
            const res = await fetch(`${API_BASE}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, pin })
            });
            const data = await res.json();
            alert(data.msg || data.error);
        }

        async function handleTransfer() {
            const to = document.getElementById('tx-to').value;
            const amount = document.getElementById('tx-amount').value;
            const pin = document.getElementById('tx-pin').value;
            const token = localStorage.getItem('jwt_token');
            const btn = document.getElementById('tx-btn');

            btn.disabled = true;
            btn.innerText = "ENCRYPTING...";

            try {
                const res = await fetch(`${API_BASE}/transfer`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ to, amount, pin })
                });
                const data = await res.json();
                alert(data.msg || data.error);
                updateUI();
            } catch (e) { alert("Network Error"); }
            finally {
                btn.disabled = false;
                btn.innerText = "AUTHORIZE TRANSFER";
            }
        }

        function handleLogout() {
            localStorage.removeItem('jwt_token');
            updateUI();
        }

        // --- 视觉动画逻辑 ---
        function runClock() {
            const now = new Date();
            document.getElementById('live-date').innerText = now.toLocaleDateString('en-US', {month:'short', day:'2-digit', year:'numeric'}).toUpperCase();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', {hour12:false});
        }
        setInterval(runClock, 1000); runClock();

        // 3D 地球仪 Canvas 代码 (已优化渲染)
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [], angleY = 0;

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            particles = Array.from({length: 300}, () => {
                const t = Math.random() * Math.PI * 2, p = Math.acos(Math.random()*2 - 1);
                return { x: Math.sin(p)*Math.cos(t), y: Math.sin(p)*Math.sin(t), z: Math.cos(p) };
            });
        }

        function draw() {
            ctx.clearRect(0,0,w,h);
            angleY += 0.0015;
            const r = Math.min(w, h) * 0.3;
            particles.forEach(p => {
                const cosY = Math.cos(angleY), sinY = Math.sin(angleY);
                const x1 = p.x * cosY - p.z * sinY;
                const z1 = p.z * cosY + p.x * sinY;
                const op = (z1 + 1) / 2;
                ctx.fillStyle = `rgba(240, 185, 11, ${op})`;
                ctx.beginPath();
                ctx.arc(x1 * r + w/2, p.y * r + h/2, op * 2, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init(); draw(); updateUI();
    </script>
</body>
</html>
